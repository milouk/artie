# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*'
    branches-ignore:
      - '**'

permissions:
  contents: write

jobs:
  build-release:
    name: Build artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build package
        uses: addnab/docker-run-action@v3
        with:
          image: docker.io/batonogov/pyinstaller-linux:latest
          options: |
            --platform linux/arm64
            --volume ${{ github.workspace }}/:/src
          run: |
            pip install -r /src/requirements.txt
            pyinstaller --onefile /src/src/app.py

      - name: Bundle App
        run: |
          mkdir -p .artie && \
          cp -r ./dist/app ./assets ./config.json .artie && \
          mkdir -p mnt/mmc/MUOS/application/Artie && \
          cp -r ./.artie ./mux_launch.sh mnt/mmc/MUOS/application/Artie/ && \
          cd mnt && \
          zip -r ../Artie.zip . && \
          cd .. && \
          mv Artie.zip Artie.muxapp

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: Artie.muxapp
